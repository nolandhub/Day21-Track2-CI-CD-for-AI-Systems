name: MLOps Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # JOB 1: Unit Test
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  # JOB 2: Train Model
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Authenticate to GCS
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Pull data with DVC
        run: |
          dvc remote modify myremote credentialpath /tmp/sa-key.json
          dvc pull

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to GCS
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          
          bucket_name = "${{ secrets.CLOUD_BUCKET }}"
          source_file = "models/model.pkl"
          destination_blob = "models/latest/model.pkl"
          
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          blob = bucket.blob(destination_blob)
          blob.upload_from_filename(source_file)
          print(f"Uploaded {source_file} to gs://{bucket_name}/{destination_blob}")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # JOB 3: Evaluation Gate
  eval:
    name: Eval Gate
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check accuracy threshold
        run: |
          python -c "
          acc = float('${{ needs.train.outputs.accuracy }}')
          print(f'Current Accuracy: {acc}')
          if acc < 0.70:
              print('❌ Accuracy too low! Deployment blocked.')
              exit(1)
          print('✅ Accuracy passed threshold. Proceeding to deploy...')
          "

  # JOB 4: Deployment
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Restart service on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 30
            curl -f http://localhost:8000/health || exit 1
